<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>
    <section class="cad">
        <h2>Cadastro</h2>
        <form class="cadform" onsubmit="return continuar(event)">
            <label for="user" class="cad">Nome de usuário
                <input type="text" id="user" name="user" required>
            </label>

            <label for="email" class="cad">Email
                <input type="email" id="email" name="email" required>

            </label>
            <p>
                <a style="cursor: pointer;" onclick="preencherEmail()">@gmail.com</a>
                <a style="cursor: pointer;" onclick="preencherYahoo()">@yahoo.com</a>
                <a style="cursor: pointer;" onclick="preencherHotmail()">@hotmail.com</a>
            </p>

            <label for="senha" class="cad">Senha
                <input type="password" id="senha" name="senha" required>
            </label>
            <p>A senha deve conter pelo menos 8 caracteres</p>

            <label for="confsenha" class="cad">Confirmar senha
                <input type="password" id="confsenha" name="confsenha" required>
            </label>
            <p id="errosenha"></p>
            <button type="submit" class="button" onclick="criarConta()">Cadastrar</button>

        </form>
        <p class="link">Já tem uma conta? <a href="login.html" id="linkcad">Faça login</a></p>
    </section>

    <footer class="footer">
        <p>© 2026 SEEM. Todos os direitos reservados.</p>
        <p><a href="inicio.html">Política de Privacidade</a> | <a href="inicio.html">Termos de Uso</a> <a
                href="inicio.html">Entre em Contato</a> | <a href="inicio.html">Perguntas Frequentes</a></p>
    </footer>

</body>

</html>
